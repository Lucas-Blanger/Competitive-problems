name: Update Stats SVG

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    paths:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG
        run: python3 scripts/generate_stats.py

      - name: Commit & Push (se houver mudança)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/output/cp-stats.svg
          git diff --cached --quiet || git commit -m "chore: update stats svg [skip ci]"
          git push
